name: AI Brief

on:
  schedule:
    # 13:00 Asia/Amman = 10:00 UTC
    - cron: '0 10 * * *'
    # 19:00 Asia/Amman = 16:00 UTC
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Override slot (midday or evening). Auto-detected from time if blank.'
        required: false
        default: ''

jobs:
  ai-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic google-auth google-auth-oauthlib google-api-python-client

      - name: Run AI Brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          RUN_TYPE_OVERRIDE: ${{ github.event.inputs.run_type }}
          RECIPIENT_EMAIL: rami@trilot.com
        run: python .claude/ai_brief_runner.py
